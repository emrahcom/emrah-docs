#publicURL: ""
publicURL: "https://meet.minikube.loc"

#turnHost: ""
turnHost: "turn.minikube.loc"

websockets:
  colibri:
    enabled: false
  xmpp:
    #enabled: false
    enabled: true

## #############################################################################
## Web configuration
## #############################################################################
web:
  gateway:
    #enabled: false
    enabled: true

    gatewayClassName: envoy-gateway-class

    # annotations: {}
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"

    host: "meet.minikube.loc"
    paths:
      - "/"

    tls:
      #enabled: false
      enabled: true
      secretName: jitsi-web-tls

  ingress:
    enabled: false

    #annotations: {}
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"

    hosts:
      - host: meet.minikube.loc
        paths:
          - "/"

    #tls: []
    tls:
      - secretName: jitsi-web-tls
        hosts:
          - meet.minikube.loc

## #############################################################################
## Excalidraw configuration
## #############################################################################
excalidraw:
  #enabled: false
  enabled: true

## #############################################################################
## Coturn configuration
## #############################################################################
coturn:
  #enabled: false
  enabled: true

  turn:
    transport: "udp"

  allowedPeerIPs:
    - "10.244.0.0-10.244.255.255"

## #############################################################################
## Jicofo configuration
## #############################################################################
jicofo:
  #extraEnvs: {}
  extraEnvs:
    MAX_BRIDGE_PARTICIPANTS: "3"

## #############################################################################
## JVB configuration
## #############################################################################
jvb:
  #replicaCount: 1
  replicaCount: 2

  publicIPs:
    - 172.18.18.21

  #useHostPort: false
  useHostPort: true
  UDPPort: 10000

  #portRangeSize: 1
  portRangeSize: 2

  service:
    #enabled: true
    enabled: false

octo:
  #enabled: false
  enabled: true

## #############################################################################
## Jigasi configuration
## #############################################################################
jigasi:
  #enabled: false
  enabled: true

  #extraEnvs: {}
  extraEnvs:
    JIGASI_SIP_URI: "jigasi.test@94..."
    JIGASI_SIP_PASSWORD: "..."
    JIGASI_SIP_SERVER: "94..."
    JIGASI_SIP_PORT: "5060"
    JIGASI_SIP_TRANSPORT: "TCP"
    JIGASI_SIP_DEFAULT_ROOM: "siptest@muc.meet.jitsi"
    JIGASI_HEALTH_CHECK_SIP_URI: "1001"
    #JIGASI_HEALTH_CHECK_SIP_URI: "9195"
    #JIGASI_CONFIGURATION: "net.java.sip.communicator.plugin.reconnectplugin.ATLEAST_ONE_SUCCESSFUL_CONNECTION.Jabber:\\jigasi@auth.meet.jitsi=true"

## #############################################################################
## Transcriber configuration
## #############################################################################
transcriber:
  #enabled: false
  enabled: true

## #############################################################################
## Jibri configuration
## #############################################################################
jibri:
  #enabled: false
  enabled: true

  shm:
    #enabled: false
    enabled: true

  #extraEnvs: {}
  extraEnvs:
    IGNORE_CERTIFICATE_ERRORS: "true"

  #hostAliases: []
  hostAliases:
    - ip: "192.168.39.112"
      hostnames:
        - "meet.minikube.loc"
