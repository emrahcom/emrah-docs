## #############################################################################
## JVB configuration
## #############################################################################
jvb:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/jvb

  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  publicIPs:
    - 172.18.18.21

  #stunServers: "meet-jit-si-turnrelay.jitsi.net:443"
  stunServers: ""

  #useInternalStun: true
  useInternalStun: false

  #useHostPort: false
  useHostPort: true
