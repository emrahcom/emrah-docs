#publicURL: ""
publicURL: "https://meet.minikube.loc"

#turnHost: ""
turnHost: "turn.minikube.loc"

websockets:
  colibri:
    enabled: false
  xmpp:
    #enabled: false
    enabled: true

## #############################################################################
## Web configuration
## #############################################################################
web:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/web

  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp

  ingress:
    # emrah (ingress)
    #enabled: false
    enabled: true

    #annotations: {}
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"

    hosts:
      - host: meet.minikube.loc
        paths: ["/"]

    #tls: []
    tls:
      - secretName: jitsi-tls
        hosts:
          - meet.minikube.loc


## #############################################################################
## Prosody configuration
## #############################################################################
prosody:
  image:
    repository: ghcr.io/jitsi-contrib/hardened-images/prosody

  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  extraVolumes:
    - name: run
      emptyDir:
        sizeLimit: 32Mi
    - name: tmp
      emptyDir:
        sizeLimit: 32Mi
    - name: storage
      emptyDir:
        sizeLimit: 32Mi

  extraVolumeMounts:
    - name: run
      mountPath: /run
    - name: tmp
      mountPath: /tmp
    - name: storage
      mountPath: /var/lib/prosody


