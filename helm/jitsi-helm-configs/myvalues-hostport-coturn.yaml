#publicURL: ""
publicURL: "https://meet.minikube.loc"

#turnHost: ""
turnHost: "turn.minikube.loc"

websockets:
  colibri:
    enabled: false
  xmpp:
    #enabled: false
    enabled: true

## #############################################################################
## Web configuration
## #############################################################################
web:
  gateway:
    #enabled: false
    enabled: true

    gatewayClassName: "envoy-gateway-class"

    # annotations: {}
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"

    host: "meet.minikube.loc"
    paths:
      - "/"

    tls:
      #enabled: false
      enabled: true
      secretName: "jitsi-web-tls"

  ingress:
    enabled: false

    #annotations: {}
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"

    hosts:
      - host: "meet.minikube.loc"
        paths:
          - "/"

    #tls: []
    tls:
      - secretName: "jitsi-web-tls"
        hosts:
          - "meet.minikube.loc"

## #############################################################################
## Etherpad configuration
## #############################################################################
etherpad:
  #enabled: false
  enabled: true

## #############################################################################
## Excalidraw configuration
## #############################################################################
excalidraw:
  #enabled: false
  enabled: true

## #############################################################################
## Coturn configuration
## #############################################################################
coturn:
  #enabled: false
  enabled: true

  turn:
    transport: "udp"

  turns:
    # test with
    #   chromium --ignore-certificate-errors

    #enabled: false
    enabled: true
    relayPortRange:
      min: 50000
      max: 54999
    certificate:
      # Create Certificate resource using cert-manager
      create: true
      # ClusterIssuer or Issuer to use
      issuerRef:
        name: selfsigned-issuer
        kind: ClusterIssuer
        group: cert-manager.io
      # Or use existing TLS secret (requires tls.crt and tls.key)
      existingSecretName: ""

      # ACME challenge proxy - enables certificate validation when
      # TURN runs on separate IP from ingress controller
      # This will proxy ACME challenges to the specified ingress
      # Requires Kubernetes native sidecar containers support
      acmeProxy:
        enabled: false
        # Internal cluster address of ingress controller
        # Defaults to traefik service in "traefik" namespace
        target: traefik.traefik.svc.cluster.local
        targetPort: 80

  service:
    ports:
      #turns: 443
      turns: 5349

  allowedPeerIPs:
    - "192.168.39.34"
    - "10.244.0.0-10.244.255.255"

## #############################################################################
## Jicofo configuration
## #############################################################################
jicofo:
  #extraEnvs: {}
  extraEnvs:
    MAX_BRIDGE_PARTICIPANTS: "3"

## #############################################################################
## JVB configuration
## #############################################################################
jvb:
  #replicaCount: 1
  replicaCount: 2

  #useInternalStun: true

  #useNodeIP: false
  useNodeIP: true

  #useHostPort: false
  useHostPort: true
  UDPPort: 10000

  #portRangeSize: 1

  service:
    #enabled: true
    enabled: false

  extraEnvs:
    JVB_DISABLE_STUN: "true"
    DISABLE_AWS_HARVESTER: "true"

octo:
  #enabled: false
  enabled: true
