#publicURL: ""
publicURL: "https://meet.minikube.loc"

#turnHost: ""
turnHost: "turn.minikube.loc"

websockets:
  colibri:
    enabled: false
  xmpp:
    #enabled: false
    enabled: true

## #############################################################################
## Web configuration
## #############################################################################
web:
  ingress:
    # emrah (ingress)
    #enabled: false
    enabled: true

    #annotations: {}
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-issuer"

    hosts:
      - host: meet.minikube.loc
        paths: ["/"]

    #tls: []
    tls:
      - secretName: jitsi-tls
        hosts:
          - meet.minikube.loc

## #############################################################################
## Excalidraw configuration
## #############################################################################
excalidraw:
  #enabled: false
  enabled: true

## #############################################################################
## Coturn configuration
## #############################################################################
coturn:
  #enabled: false
  enabled: true

  allowedPeerIp:
    - "192.168.39.112"
  #  - "10.244.0.0-10.244.255.255"

## #############################################################################
## Jicofo configuration
## #############################################################################
jicofo:
  #extraEnvs: {}
  extraEnvs:
    MAX_BRIDGE_PARTICIPANTS: "3"

## #############################################################################
## JVB configuration
## #############################################################################
jvb:
  #replicaCount: 1
  replicaCount: 2

  #useInternalStun: true

  #useNodeIP: false
  useNodeIP: true

  #useHostPort: false
  useHostPort: true
  UDPPort: 10000

  #portRangeSize: 1

  service:
    #enabled: true
    enabled: false

  extraEnvs:
    JVB_DISABLE_STUN: "true"
    DISABLE_AWS_HARVESTER: "true"

octo:
  #enabled: false
  enabled: true
